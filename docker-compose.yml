version: "3.8"

services:

  mysql:
    image: mysql:8.0
    container_name: forum-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass_2026
      MYSQL_DATABASE: forum_db
      MYSQL_USER: forum_user
      MYSQL_PASSWORD: forum_pass_2026
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass_2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forum-backend
    restart: unless-stopped
    ports:
      - "8092:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: forum-frontend
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads_data:
